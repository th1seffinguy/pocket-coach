<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pocket Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0F1115; --surface:#161920; --elevated:#1D2129; --border:#262C36;
    --blue:#1E8CE8; --coral:#D9502B; --amber:#DBA514; --green:#22C55E; --purple:#A78BFA;
    --text:#F0F2F5; --muted:#8892A0;
    --bebas:'Bebas Neue',sans-serif; --sans:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:90px;}

  /* HEADER */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 0;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-ball{width:34px;height:34px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .logo-text{font-family:var(--bebas);font-size:19px;letter-spacing:1px;line-height:1;}
  .logo-sub{font-size:10px;color:var(--muted);font-family:var(--mono);}
  .session-badge{background:var(--elevated);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--amber);font-family:var(--mono);white-space:nowrap;}

  /* AGE SELECTOR */
  .age-bar{display:flex;align-items:center;gap:8px;padding:0 0 10px;margin-top:2px;}
  .age-arrow{width:30px;height:30px;background:var(--elevated);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--blue);flex-shrink:0;transition:all 0.15s;user-select:none;}
  .age-arrow:active{transform:scale(0.88);background:var(--border);}
  .age-arrow.disabled{opacity:0.3;pointer-events:none;}
  .age-selector-wrap{flex:1;position:relative;}
  .age-select{width:100%;background:var(--elevated);border:1px solid var(--blue);border-radius:10px;color:var(--text);font-family:var(--bebas);font-size:16px;letter-spacing:1px;padding:7px 12px;appearance:none;cursor:pointer;outline:none;}
  .age-select-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--blue);font-size:12px;pointer-events:none;}
  .age-badge{background:var(--blue);border-radius:6px;padding:3px 8px;font-size:10px;font-family:var(--mono);color:white;white-space:nowrap;flex-shrink:0;}

  /* TABS */
  .tabs{display:flex;background:var(--elevated);border-radius:10px;padding:3px;gap:2px;}
  .tab{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;transition:all 0.2s;}
  .tab.active{background:var(--blue);color:white;}

  .content{padding:14px 16px;}
  .view{display:none;}
  .view.active{display:block;}

  /* TIMER */
  .timer-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
  .timer-main{flex:1;}
  .timer-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
  .timer-value{font-family:var(--bebas);font-size:32px;color:var(--green);letter-spacing:1px;line-height:1;margin-bottom:6px;}
  .timer-track{height:3px;background:var(--elevated);border-radius:2px;overflow:hidden;}
  .timer-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear,background 0.5s;}
  .timer-btn{background:var(--green);border:none;border-radius:10px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0;transition:transform 0.15s;}
  .timer-btn:active{transform:scale(0.9);}

  /* DURATION SELECTOR */
  .dur-row{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;scrollbar-width:none;}
  .dur-row::-webkit-scrollbar{display:none;}
  .dur-chip{padding:5px 11px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;font-family:var(--mono);font-weight:700;white-space:nowrap;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
  .dur-chip.active{background:var(--blue);border-color:var(--blue);color:white;}
  .dur-chip:active{transform:scale(0.92);}

  /* ACTIONS */
  .action-row{display:flex;gap:8px;margin-bottom:10px;}
  .btn{flex:1;padding:11px 6px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:4px;}
  .btn:active{transform:scale(0.95);}
  .btn.primary{background:var(--blue);border-color:var(--blue);}
  .btn.accent{background:var(--amber);border-color:var(--amber);color:#0F1115;}

  /* SESSION PRIORITY TIP */
  .session-tip{font-size:10px;color:var(--muted);font-family:var(--mono);text-align:center;padding:0 0 12px;letter-spacing:.03em;display:none;}
  .session-tip strong{color:var(--coral);}

  /* DRILL CARD */
  .drill-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;animation:fadeUp 0.3s ease forwards;}
  .drill-card.p1{border-left:3px solid var(--coral);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .drill-card.done{opacity:0.4;}
  .drill-header{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:12px;}
  .drill-icon{width:68px;height:68px;background:var(--elevated);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border);overflow:hidden;}
  .drill-icon svg{width:54px;height:54px;}
  .drill-meta{flex:1;min-width:0;}
  .drill-num-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
  .drill-num{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;}
  .priority-badge{background:#D9502B18;border:1px solid #D9502B55;border-radius:4px;padding:1px 5px;font-size:9px;font-family:var(--mono);color:var(--coral);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
  .drill-name{font-family:var(--bebas);font-size:21px;letter-spacing:.5px;line-height:1.05;margin-bottom:5px;}
  .drill-row2{display:flex;align-items:center;justify-content:space-between;}
  .dur-badge{display:inline-flex;align-items:center;gap:4px;background:var(--elevated);border-radius:5px;padding:3px 7px;font-size:11px;font-family:var(--mono);color:var(--amber);}
  .drill-btns{display:flex;gap:6px;}
  .icon-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--elevated);color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
  .icon-btn:active{transform:scale(0.88);}
  .icon-btn.green{border-color:var(--green);color:var(--green);}
  .icon-btn.blue{border-color:var(--blue);color:var(--blue);}
  .drill-body{padding:0 14px 12px;}
  .info-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;margin-top:8px;}
  .info-txt{font-size:13px;line-height:1.5;color:var(--text);}
  .cue-box{background:var(--elevated);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:8px 12px;margin-top:10px;}
  .cue-lbl{font-size:9px;font-family:var(--mono);color:var(--amber);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
  .cue-txt{font-size:13px;font-style:italic;}
  .success-row{display:flex;align-items:flex-start;gap:7px;margin-top:8px;background:#22c55e0f;border:1px solid #22c55e25;border-radius:8px;padding:8px 10px;}
  .success-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
  .success-txt{font-size:12px;color:var(--green);line-height:1.4;}

  /* INSIGHTS */
  .insights-box{background:var(--elevated);border-left:3px solid var(--purple);border-radius:0 8px 8px 0;padding:8px 12px;margin-top:8px;}
  .insights-lbl{font-size:9px;font-family:var(--mono);color:var(--purple);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
  .insights-list{list-style:none;display:flex;flex-direction:column;gap:5px;}
  .insights-list li{font-size:12px;line-height:1.45;color:var(--muted);padding-left:14px;position:relative;}
  .insights-list li::before{content:'→';position:absolute;left:0;color:var(--purple);font-size:10px;top:1px;}

  /* AGE GROUP FOCUS BANNER */
  .focus-banner{background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;}
  .focus-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:4px;}
  .focus-text{font-size:12px;color:var(--muted);line-height:1.5;}
  .focus-text strong{color:var(--text);}

  /* SAVE BAR */
  .save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 16px;background:var(--bg);border-top:1px solid var(--border);z-index:200;}
  .save-btn{width:100%;padding:13px;background:var(--green);border:none;border-radius:12px;color:#0F1115;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
  .save-btn:active{transform:scale(0.97);}
  .save-btn.saved{background:var(--elevated);border:1px solid var(--border);color:var(--muted);}

  /* TOAST */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--elevated);border:1px solid var(--green);border-radius:10px;padding:9px 16px;font-size:12px;font-weight:600;font-family:var(--mono);color:var(--green);opacity:0;transition:all 0.25s;white-space:nowrap;z-index:400;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:flex-end;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 16px 24px;width:100%;max-height:72vh;overflow-y:auto;animation:up 0.22s ease;}
  @keyframes up{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-title{font-family:var(--bebas);font-size:22px;letter-spacing:.5px;margin-bottom:2px;}
  .modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .opt{background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color 0.15s;}
  .opt:active{border-color:var(--blue);}
  .opt-icon{width:44px;height:44px;background:var(--surface);border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .opt-icon svg{width:34px;height:34px;}
  .opt-info{flex:1;}
  .opt-name{font-weight:700;font-size:13px;margin-bottom:3px;}
  .opt-tags{display:flex;gap:5px;flex-wrap:wrap;}
  .tag{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:var(--surface);color:var(--muted);border:1px solid var(--border);}
  .modal-cancel{width:100%;padding:13px;background:var(--elevated);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}

  /* LIBRARY */
  .lib-search{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:14px;margin-bottom:10px;outline:none;}
  .lib-search:focus{border-color:var(--blue);}
  .filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
  .chip{padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;transition:all 0.15s;}
  .chip.active{background:var(--blue);border-color:var(--blue);color:white;}
  .lib-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
  .lib-card-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .lib-icon{width:52px;height:52px;background:var(--elevated);border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .lib-icon svg{width:40px;height:40px;}
  .lib-name{font-family:var(--bebas);font-size:19px;letter-spacing:.3px;margin-bottom:2px;}
  .age-pill{display:inline-block;background:var(--elevated);border:1px solid var(--border);border-radius:4px;font-size:10px;font-family:var(--mono);color:var(--blue);padding:2px 6px;margin-right:4px;}

  /* PROGRESS */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .stat-val{font-family:var(--bebas);font-size:34px;color:var(--blue);line-height:1;margin-bottom:4px;}
  .stat-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;}
  .section-hd{font-family:var(--bebas);font-size:17px;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;}
  .hist-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
  .hist-date{font-size:11px;font-family:var(--mono);color:var(--muted);}
  .hist-badge{background:var(--elevated);border-radius:6px;padding:4px 8px;font-size:11px;font-family:var(--mono);color:var(--green);white-space:nowrap;}
  .hist-drills{font-size:13px;font-weight:600;line-height:1.4;}
  .hist-meta{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:4px;}
  .hist-skipped{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic;}
  .empty{text-align:center;padding:40px 16px;}
  .empty-ico{font-size:44px;margin-bottom:10px;}
  .empty-ttl{font-family:var(--bebas);font-size:22px;margin-bottom:6px;}
  .empty-txt{font-size:13px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-ball">⚽</div>
      <div>
        <div class="logo-text">Pocket Coach</div>
        <div class="logo-sub">BACKYARD · DAD-LED · SIZE 3 BALL</div>
      </div>
    </div>
    <div class="session-badge" id="badge">20 MIN</div>
  </div>

  <div class="age-bar">
    <div class="age-arrow" id="ageLeft" onclick="shiftAge(-1)">‹</div>
    <div class="age-selector-wrap">
      <select class="age-select" id="ageSelect" onchange="onAgeChange()">
        <option value="0">U4/U6 · Ages 3–5</option>
        <option value="1" selected>U6/U8 · Ages 5–7</option>
        <option value="2">U8/U10 · Ages 7–9</option>
        <option value="3">U10/U12 · Ages 9–11</option>
      </select>
      <div class="age-select-arrow">▾</div>
    </div>
    <div class="age-arrow" id="ageRight" onclick="shiftAge(1)">›</div>
    <div class="age-badge" id="ageBadge">U6/U8</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchView('session',this)">Today</button>
    <button class="tab" onclick="switchView('library',this)">Drills</button>
    <button class="tab" onclick="switchView('progress',this)">Progress</button>
  </div>
</div>

<div class="content">
  <div class="view active" id="view-session">
    <div class="focus-banner">
      <div class="focus-dot"></div>
      <div class="focus-text" id="focusText"></div>
    </div>
    <div class="dur-row" id="durRow"></div>
    <div class="timer-bar">
      <div class="timer-main">
        <div class="timer-label">Session Timer</div>
        <div class="timer-value" id="timerDisplay">20:00</div>
        <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
      </div>
      <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">▶</button>
    </div>
    <div class="action-row">
      <button class="btn primary" onclick="generateSession()">⚡ New</button>
      <button class="btn accent" onclick="randomizeAll()">🎲 Shuffle</button>
      <button class="btn" onclick="resetTimer()">↺ Reset</button>
    </div>
    <div class="session-tip" id="sessionTip"><strong>KEY DRILL</strong> cards appear first — finish those if time is short</div>
    <div id="drillList"></div>
  </div>

  <div class="view" id="view-library">
    <input class="lib-search" id="libSearch" type="text" placeholder="Search all drills..." oninput="renderLib()">
    <div class="filter-row">
      <button class="chip active" data-filter="age" onclick="setFilter('age',this)">This Age</button>
      <button class="chip" data-filter="all" onclick="setFilter('all',this)">All Ages</button>
      <button class="chip" data-filter="control" onclick="setFilter('control',this)">Control</button>
      <button class="chip" data-filter="shooting" onclick="setFilter('shooting',this)">Shooting</button>
      <button class="chip" data-filter="movement" onclick="setFilter('movement',this)">Movement</button>
      <button class="chip" data-filter="passing" onclick="setFilter('passing',this)">Passing</button>
      <button class="chip" data-filter="fun" onclick="setFilter('fun',this)">⭐ Fun</button>
    </div>
    <div id="libList"></div>
  </div>

  <div class="view" id="view-progress">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val" id="pSessions">0</div><div class="stat-lbl">Sessions</div></div>
      <div class="stat-card"><div class="stat-val" id="pDrills">0</div><div class="stat-lbl">Drills Done</div></div>
      <div class="stat-card"><div class="stat-val" id="pMinutes">0</div><div class="stat-lbl">Minutes</div></div>
      <div class="stat-card"><div class="stat-val" id="pStreak">0</div><div class="stat-lbl">Streak 🔥</div></div>
    </div>
    <div class="section-hd">Session History</div>
    <div id="histList"></div>
  </div>
</div>

<!-- Save bar — fixed to bottom, session view only -->
<div class="save-bar" id="saveBar">
  <button class="save-btn" id="saveBtn" onclick="endSession()">📋 Record Session</button>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="modal">
    <div class="modal-title">Swap Drill</div>
    <div class="modal-sub">Choose a replacement from this age group</div>
    <div id="swapList"></div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
// ─── SVG ICONS ────────────────────────────────────────────────────────────────

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'pocketcoach_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { sessions:[], totalDrills:0, totalMinutes:0, streak:0, lastDate:null };
}

function persistState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ─── APP STATE ────────────────────────────────────────────────────────────────
const DURATION_OPTIONS = [10, 15, 20, 25, 30, 40, 45, 60];
let ageIdx = 1;
let sessionMins = AGE_GROUPS[1].defaultMins;
let session = [], done = new Set(), swapIdx = null;
let timerSec = sessionMins * 60, totalSec = sessionMins * 60, ticking = false, interval = null;
let activeFilter = 'age';
let state = loadState();

const curGroup  = () => AGE_GROUPS[ageIdx];
const getDrill  = id => ALL_DRILLS[id];
const icon = (id, size=54) => `<svg viewBox="0 0 ${size} ${size}">${(ICONS[id]||'<circle cx="27" cy="27" r="22" fill="#22C55E" opacity=".4"/>').replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>`;

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── DURATION SELECTOR ────────────────────────────────────────────────────────
function renderDurChips() {
  document.getElementById('durRow').innerHTML = DURATION_OPTIONS.map(m =>
    `<button class="dur-chip ${m === sessionMins ? 'active' : ''}" onclick="selectDuration(${m})">${m}m</button>`
  ).join('');
}

function selectDuration(mins) {
  sessionMins = mins;
  renderDurChips();
  if (ticking) {
    showToast('Tap ↺ Reset to apply');
    return;
  }
  totalSec = timerSec = mins * 60;
  updateTimer();
  document.getElementById('timerFill').style.width = '100%';
}

// ─── AGE SELECTOR ─────────────────────────────────────────────────────────────
function updateAgeUI() {
  const g = curGroup();
  document.getElementById('ageSelect').value = ageIdx;
  document.getElementById('ageBadge').textContent = g.badge;
  document.getElementById('ageLeft').classList.toggle('disabled', ageIdx === 0);
  document.getElementById('ageRight').classList.toggle('disabled', ageIdx === AGE_GROUPS.length - 1);
  document.getElementById('focusText').innerHTML = g.focus;
  sessionMins = g.defaultMins;
  renderDurChips();
  totalSec = timerSec = sessionMins * 60;
  updateTimer();
  document.getElementById('timerFill').style.width = '100%';
}

function shiftAge(dir) {
  const next = ageIdx + dir;
  if (next < 0 || next >= AGE_GROUPS.length) return;
  ageIdx = next;
  updateAgeUI();
  generateSession();
}

function onAgeChange() {
  ageIdx = parseInt(document.getElementById('ageSelect').value);
  updateAgeUI();
  generateSession();
}

// ─── SMART SESSION GENERATION ─────────────────────────────────────────────────
function generateSession() {
  done.clear();
  stopTimer();
  resetSaveBtn();
  const g = curGroup();
  timerSec = totalSec = sessionMins * 60;
  updateTimer();
  document.getElementById('timerFill').style.width = '100%';

  // Recent sessions for this age group (last 5)
  const recent = state.sessions
    .filter(s => s.ageIdx === ageIdx)
    .slice(-5);

  const pool = g.drills
    .filter(id => id !== 'freestyle')
    .map(getDrill)
    .filter(Boolean);

  // Score: higher = pick first
  // Base: priority 1→300, 2→200, 3→100
  // Recency penalty per session (most recent penalises most)
  const penalties = [60, 40, 25, 15, 10];
  const scored = pool.map(d => {
    let score = (4 - d.priority) * 100;
    recent.forEach((s, idx) => {
      const w = penalties[recent.length - 1 - idx] || 10;
      if ((s.drillsDone || []).includes(d.id)) score -= w;
      else if ((s.drillsTotal || []).includes(d.id)) score -= Math.round(w * 0.3);
    });
    return { ...d, score };
  });

  scored.sort((a, b) => b.score - a.score);

  // Fill time budget (reserve freestyle duration)
  const budget = sessionMins - getDrill('freestyle').duration;
  const picked = [];
  let time = 0;
  for (const d of scored) {
    if (picked.length >= 5) break;
    if (time + d.duration <= budget + 1) {
      picked.push(d);
      time += d.duration;
      if (time >= budget) break;
    }
  }

  // Display order: priority ascending (1 first), then by score within same priority
  picked.sort((a, b) => a.priority !== b.priority ? a.priority - b.priority : b.score - a.score);

  session = [...picked, getDrill('freestyle')];
  renderSession();
}

function randomizeAll() {
  done.clear();
  stopTimer();
  resetSaveBtn();
  const g = curGroup();
  timerSec = totalSec = sessionMins * 60;
  updateTimer();
  const pool = g.drills.filter(id => id !== 'freestyle').map(getDrill).filter(Boolean)
    .sort(() => Math.random() - 0.5).slice(0, 4);
  session = [...pool, getDrill('freestyle')];
  renderSession();
}

function resetTimer() {
  done.clear();
  stopTimer();
  resetSaveBtn();
  timerSec = totalSec = sessionMins * 60;
  updateTimer();
  document.getElementById('timerFill').style.width = '100%';
  renderSession();
}

// ─── RECORD SESSION ───────────────────────────────────────────────────────────
function endSession() {
  stopTimer();
  const doneIds = [...done].map(i => session[i]?.id).filter(Boolean);
  const totalIds = session.map(d => d.id);

  // Streak: consecutive calendar days
  const todayStr = new Date().toDateString();
  const yesterdayStr = new Date(Date.now() - 86400000).toDateString();
  if (!state.lastDate || state.lastDate === todayStr) {
    // first ever or already saved today — don't double-count streak
    if (!state.lastDate) state.streak = 1;
  } else if (state.lastDate === yesterdayStr) {
    state.streak = (state.streak || 0) + 1;
  } else {
    state.streak = 1;
  }
  state.lastDate = todayStr;

  const today = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' });
  const minsDone = doneIds.reduce((a, id) => a + (getDrill(id)?.duration || 0), 0);

  state.sessions.push({
    id: Date.now(),
    date: today,
    ageGroup: curGroup().label,
    ageIdx,
    drillsDone: doneIds,
    drillsTotal: totalIds,
    minutes: session.reduce((a, d) => a + d.duration, 0),
    minutesDone: minsDone,
  });
  state.totalDrills += doneIds.length;
  state.totalMinutes += minsDone;
  persistState();

  const btn = document.getElementById('saveBtn');
  btn.textContent = `✓ Saved — ${doneIds.length} drill${doneIds.length !== 1 ? 's' : ''} recorded`;
  btn.classList.add('saved');
  showToast(`Session saved · ${minsDone}m recorded`);
}

function resetSaveBtn() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = '📋 Record Session';
  btn.classList.remove('saved');
}

// ─── RENDER SESSION ───────────────────────────────────────────────────────────

  const el = document.getElementById('drillList');

    el.innerHTML = `<div class="empty"><div class="empty-ico">⚽</div><div class="empty-ttl">No Session Yet</div><div class="empty-txt">Tap New to load today's drills.</div></div>`;

    return;
  }

  const mins = session.reduce((a, d) => a + d.duration, 0);
  document.getElementById('badge').textContent = `${mins} MIN`;
  tip.style.display = 'block';

  el.innerHTML = session.map((d, i) => `
    <div class="drill-card ${done.has(i) ? 'done' : ''} ${d.priority === 1 ? 'p1' : ''}" id="card-${i}">
      <div class="drill-header">
        <div class="drill-icon">${icon(d.id)}</div>
        <div class="drill-meta">
          <div class="drill-num-row">

            ${d.priority === 1 ? '<span class="priority-badge">KEY DRILL</span>' : ''}
          </div>

          <div class="drill-row2">
            <div class="dur-badge">⏱ ${d.duration} min</div>

        </div>

        ${d.insights ? `

    </div>`).join('');

function markDone(i) {
  done.has(i) ? done.delete(i) : done.add(i);
  renderSession();
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function toggleTimer() { ticking ? stopTimer() : startTimer(); }
function startTimer() {
  ticking = true;
  document.getElementById('timerBtn').textContent = '⏸';
  interval = setInterval(() => {
    timerSec--;
    if (timerSec <= 0) { timerSec = 0; stopTimer(); document.getElementById('timerBtn').textContent = '✓'; }
    updateTimer();
  }, 1000);
}
function stopTimer() {
  ticking = false;
  clearInterval(interval);
  if (timerSec > 0) document.getElementById('timerBtn').textContent = '▶';
}
function updateTimer() {
  const m = Math.floor(timerSec / 60), s = timerSec % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  const pct = timerSec / totalSec;
  document.getElementById('timerFill').style.width = (pct * 100) + '%';
  const col = pct > .5 ? 'var(--green)' : pct > .25 ? 'var(--amber)' : 'var(--coral)';
  document.getElementById('timerDisplay').style.color = col;
  document.getElementById('timerFill').style.background = col;
}

// ─── SWAP ─────────────────────────────────────────────────────────────────────
function openSwap(i) {
  swapIdx = i;
  const cur = session[i];
  const g = curGroup();
  const opts = g.drills.filter(id => id !== cur.id && !session.find(s => s.id === id)).map(getDrill).filter(Boolean);
  document.getElementById('swapList').innerHTML = opts.map(d => `
    <div class="opt" onclick="doSwap('${d.id}')">
      <div class="opt-icon">${icon(d.id)}</div>
      <div class="opt-info">
        <div class="opt-name">${d.name}${d.priority === 1 ? ' <span class="priority-badge">KEY</span>' : ''}</div>
        <div class="opt-tags">${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}<span class="tag">${d.duration}m</span></div>
      </div>
      <span style="color:var(--blue);font-size:18px;flex-shrink:0">→</span>
    </div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function doSwap(id) { if (swapIdx !== null) { session[swapIdx] = getDrill(id); done.delete(swapIdx); renderSession(); } closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); swapIdx = null; }
function maybeClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function renderLib() {
  const search = document.getElementById('libSearch')?.value.toLowerCase() || '';
  let drills = Object.values(ALL_DRILLS);
  if (activeFilter === 'age') drills = drills.filter(d => d.ages.includes(ageIdx));
  else if (activeFilter === 'fun') drills = drills.filter(d => d.fun);
  else if (activeFilter !== 'all') drills = drills.filter(d => d.tags.includes(activeFilter));
  if (search) drills = drills.filter(d => d.name.toLowerCase().includes(search));

  document.getElementById('libList').innerHTML = drills.length ? drills.map(d => {
    const agePills = d.ages.map(a => `<span class="age-pill">${AGE_GROUPS[a].badge}</span>`).join('');
    return `<div class="lib-card">
      <div class="lib-card-header">
        <div class="lib-icon">${icon(d.id)}</div>
        <div>
          <div class="lib-name">${d.name}${d.priority === 1 ? ' <span class="priority-badge">KEY DRILL</span>' : ''}</div>
          <div style="margin-top:4px">${agePills}<span class="tag" style="margin-left:2px">⏱ ${d.duration}m</span></div>
        </div>
      </div>
      <div class="info-lbl">How to Play</div>
      <div class="info-txt" style="margin-bottom:8px">${d.how}</div>
      <div class="cue-box"><div class="cue-lbl">Dad's Cue</div><div class="cue-txt">"${d.cue}"</div></div>
      ${d.insights ? `<div class="insights-box" style="margin-top:8px"><div class="insights-lbl">Why This Drill</div><ul class="insights-list">${d.insights.map(b => `<li>${b}</li>`).join('')}</ul></div>` : ''}
      <div style="margin-top:8px">${d.tags.map(t => `<span class="tag">${t}</span> `).join('')}${d.fun ? '<span class="tag" style="color:var(--amber);border-color:var(--amber)80">⭐ high fun</span>' : ''}</div>
    </div>`;
  }).join('') :
    `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-ttl">No Results</div><div class="empty-txt">Try a different filter or search term.</div></div>`;
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderLib();
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress() {
  document.getElementById('pSessions').textContent = state.sessions.length;
  document.getElementById('pDrills').textContent = state.totalDrills;
  document.getElementById('pMinutes').textContent = state.totalMinutes;
  document.getElementById('pStreak').textContent = state.streak || 0;

  const hist = document.getElementById('histList');
  if (!state.sessions.length) {
    hist.innerHTML = `<div class="empty"><div class="empty-ico">📋</div><div class="empty-ttl">No Sessions Yet</div><div class="empty-txt">Run a session and tap Record to start building your history.</div></div>`;
    return;
  }

  hist.innerHTML = [...state.sessions].reverse().slice(0, 10).map(s => {
    const doneNames = (s.drillsDone || []).map(id => getDrill(id)?.name || id);
    const skipped = (s.drillsTotal || [])
      .filter(id => !(s.drillsDone || []).includes(id))
      .map(id => getDrill(id)?.name || id);
    const completion = s.drillsTotal?.length
      ? `${s.drillsDone?.length || 0} / ${s.drillsTotal.length} drills`
      : `${doneNames.length} drills`;
    return `<div class="hist-item">
      <div class="hist-top">
        <div>
          <div class="hist-date">${s.date} · ${s.ageGroup || ''}</div>
          <div class="hist-meta">${completion} · ${s.minutesDone ?? s.minutes ?? 0}m</div>
        </div>
        <div class="hist-badge">${s.minutesDone ?? s.minutes ?? 0}m</div>
      </div>
      ${doneNames.length ? `<div class="hist-drills">${doneNames.join(' · ')}</div>` : ''}
      ${skipped.length ? `<div class="hist-skipped">Skipped: ${skipped.join(', ')}</div>` : ''}
    </div>`;
  }).join('');
}

// ─── VIEW SWITCH ──────────────────────────────────────────────────────────────
function switchView(name, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  el.classList.add('active');
  document.getElementById('saveBar').style.display = name === 'session' ? 'block' : 'none';
  if (name === 'library') renderLib();
  if (name === 'progress') renderProgress();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateAgeUI();
generateSession();
</script>
</body>
</html>
